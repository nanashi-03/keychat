server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Load standard MIME types (HTML, CSS, JS, SVG, etc.)
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Add WASM MIME type explicitly if missing from default mime.types
    types {
        application/wasm wasm;
    }

    # SPA Routing: Serve index.html as text/html
    location / {
        try_files $uri $uri/ /index.html;
        add_header Content-Type text/html;
    }

    # Ensure JS and CSS assets are served with proper MIME types
    location /assets/ {
        try_files $uri =404;
    }

    # Proxy REST API requests to FastAPI backend container
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy WebSocket connections with protocol upgrade headers
    location /ws {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
    }
}
